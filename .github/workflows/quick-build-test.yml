name: Quick Package Build Test

# 用法:
# 1. 去 Actions 页面手动触发 (workflow_dispatch)
# 2. 填 sdk_url: 换成和你真实固件完全匹配的 target/subtarget/版本 的 SDK 下载链接
#    (在 https://downloads.openwrt.org/ 或 https://firmware-selector.openwrt.org/
#     对应 target 页面里找 xxx-sdk-xxx.tar.zst / tar.xz 那个文件的直链)
#    必须和你真正编固件时用的 target/subtarget/musl 版本一致，
#    否则这里编过不代表真实固件里能编过。
# 3. package_name 默认 mmw-test（几秒编完，用来验证 Makefile 语法/feeds 流程本身没问题）
#    验证通过后把 package_name 改成 miaomiaowu 再跑一次，测试真正下载+打包那条路径。

on:
  workflow_dispatch:
    inputs:
      sdk_url:
        description: "OpenWrt/ImmortalWrt SDK 下载直链 (.tar.zst 或 .tar.xz)，默认是 qualcommax/ipq807x aarch64_cortex-a53"
        required: false
        default: "https://downloads.openwrt.org/snapshots/targets/qualcommax/ipq807x/openwrt-sdk-qualcommax-ipq807x_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
        type: string
      package_name:
        description: "要编译的包名 (miaomiaowu / luci-app-miaomiaowu / mmw-test)"
        required: false
        default: "mmw-test"
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget zstd

      - name: 下载并解压 SDK
        run: |
          set -e
          echo "使用的 SDK 链接: ${{ inputs.sdk_url }}"
          echo "---- 先探测一下这个链接返回什么 ----"
          curl -sSL -o /dev/null -w "HTTP状态码: %{http_code}\n最终跳转到: %{url_effective}\n" "${{ inputs.sdk_url }}" || echo "curl 探测本身就失败了，多半是链接拼错或域名解析不了"
          wget --tries=3 --timeout=30 -O sdk.tar.xxx "${{ inputs.sdk_url }}"
          mkdir -p sdk
          FILE="sdk.tar.xxx"
          file "$FILE"
          if file "$FILE" | grep -q Zstandard; then
            tar --use-compress-program=unzstd -xf "$FILE" -C sdk --strip-components=1
          else
            tar -xf "$FILE" -C sdk --strip-components=1
          fi

      - name: 添加你自己的包源到 feeds.conf.default
        run: |
          cd sdk
          echo "src-git miaomiaowu https://github.com/xiaohai77/OpenWrt-MMW.git;main" >> feeds.conf.default
          cat feeds.conf.default

      - name: 更新并安装 feeds
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: defconfig
        run: |
          cd sdk
          make defconfig

      - name: 只编译目标包
        run: |
          cd sdk
          # 通过 src-git 拉进来的包路径是 package/feeds/miaomiaowu/<包名>
          # (对应你日志里看到的 feeds/miaomiaowu/miaomiaowu 那条路径)
          make package/feeds/miaomiaowu/${{ inputs.package_name }}/{clean,download,prepare,compile} V=s -j$(nproc)

      - name: 打包产物路径打印
        run: |
          cd sdk
          echo "---- 生成的 ipk/apk ----"
          find bin/packages -iname "*${{ inputs.package_name }}*" || echo "没找到产物，看上面日志报错"

      - name: 上传编译产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-result-${{ inputs.package_name }}
          path: |
            sdk/bin/packages/**/*${{ inputs.package_name }}*
            sdk/logs/**
          if-no-files-found: warn
